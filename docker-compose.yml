name: arke

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd:/etcd
    command: >
      etcd -advertise-client-urls=http://etcd:2379
           -listen-client-urls http://0.0.0.0:2379
           --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: arke-milvus
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-19090}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-bridge:
    build:
      context: ./milvus-bridge
    container_name: arke-milvus-bridge
    restart: unless-stopped
    depends_on:
      milvus:
        condition: service_healthy
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      PORT: 8088
    ports:
      - "${MILVUS_BRIDGE_PORT:-18088}:8088"

  mysql:
    image: mysql:8.4.9
    container_name: arke-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-doc_parse_qa}
      MYSQL_USER: ${MYSQL_USER:-docqa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-docqa_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13406}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USER:-docqa}", "-p${MYSQL_PASSWORD:-docqa_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    container_name: arke-rustfs
    restart: unless-stopped
    user: "0:0"
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
      TZ: Asia/Shanghai
    ports:
      - "${RUSTFS_PORT:-19000}:9000"
      - "${RUSTFS_WEBUI_PORT:-19001}:9001"
    volumes:
      - rustfs_data:/data

  server:
    build:
      context: ./backend
    container_name: arke-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rustfs:
        condition: service_started
      milvus:
        condition: service_healthy
      milvus-bridge:
        condition: service_started
    environment:
      APP_ENV: prod
      TZ: Asia/Shanghai
      MILVUS_BRIDGE_URL: http://milvus-bridge:8088
      S3_ENDPOINT: ${S3_ENDPOINT:-rustfs:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET: ${S3_BUCKET:-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
    ports:
      - "${SERVER_PORT:-8082}:8080"
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: arke-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-18083}:80"

volumes:
  mysql_data:
  rustfs_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
